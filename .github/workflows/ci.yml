name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      MY_CREW_LLM_SUPERVISOR: "0"
      MY_CREW_LLM_ROUTING: "0"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Compile sources
        run: python -m compileall src

      - name: Run tests
        run: pytest -q
