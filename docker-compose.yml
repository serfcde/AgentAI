services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: my-crew-app
    environment:
      PYTHONPATH: /app/src
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: llama3.1
    depends_on:
      ollama:
        condition: service_started
    volumes:
      - ./src:/app/src:ro
      - ./.env:/app/.env:ro
    command: ["python", "-m", "my_crew.main"]

  ollama:
    image: ollama/ollama:latest
    container_name: my-crew-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama

volumes:
  ollama-data:
