research_task:
  description: >
    Research the selected topic thoroughly. Focus on latest trends, important
    technologies, real-world applications, challenges, and future scope. Use
    available tools whenever necessary and provide structured research findings.
  expected_output: >
    A detailed research report with overview, key insights, trends,
    applications, challenges, and conclusion.
  agent: research_agent

planning_task:
  description: >
    Create a strategic execution plan for the selected topic using the research
    context. Break the work into phases, milestones, execution steps,
    priorities, and dependencies.
  expected_output: >
    A structured execution roadmap including phases, task breakdown, priorities,
    dependencies, and execution order.
  agent: planning_agent
  context_from:
    - research_task

execution_task:
  description: >
    Execute the implementation strategy for the selected topic using the
    planning context. Produce actionable execution details and implementation
    guidance.
  expected_output: >
    Actionable implementation steps and execution details.
  agent: execution_agent
  context_from:
    - planning_task

validation_task:
  description: >
    Validate all generated outputs for correctness, consistency, logical flow,
    completeness, and reliability. Suggest improvements if needed.
  expected_output: >
    Validation report including detected issues, quality assessment,
    improvement suggestions, and final evaluation.
  agent: validation_agent
  context_from:
    - execution_task

supervision_task:
  description: >
    Supervise the overall workflow, coordinate delegation, monitor A2A
    communication, and ensure the final output satisfies the user objective.
  expected_output: >
    Supervisor summary with orchestration decisions, delegation notes,
    communication trace, risks, and final approval status.
  agent: supervisor_agent
  context_from:
    - research_task
    - planning_task
    - execution_task
    - validation_task
